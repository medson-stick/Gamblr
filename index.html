<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gamblr</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ui">
    <div class="left">
      <h1>Plinko</h1>
      <p>Click one of the top drop positions to release a ball. One ball at a time. Each ball costs $500.</p>
    </div>

    <div class="right">
      <div id="bankroll">$10,000</div>
      <div id="status">Pick a drop point</div>
    </div>
  </div>

<div id="gameWrapper">
  <div id="gameContainer"></div>
</div>

<video id="glitchOverlay" muted playsinline preload="auto">
  <source src="glitch.mp4" type="video/mp4">
</video>
  <div id="message">Click a glowing top position to start.</div>

  <div id="jumpscareOverlay">
  <img id="jumpscareImage" src="jumpscare.jpg" alt="Jumpscare">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
